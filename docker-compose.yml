version: '3.8'

services:
  mysql:
    image: docker-registry-002.zeuslearning.com/zeuslearning/mysql:latest
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_DATABASE: trainee_management
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis:latest
    container_name: redis_server 
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    
  rabbitmq:
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq
    container_name: rabbitmq
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root
    configs:
      - source: rabbitmq-plugins
        target: /etc/rabbitmq/enabled_plugins
    volumes:
      - rabbitmq_lib:/var/lib/rabbitmq/
      - rabbitmq_log:/var/log/rabbitmq
 
configs:
  rabbitmq-plugins:
    content: "[rabbitmq_management]."  
 
volumes:
  mysql_data:
  redis_data:
  rabbitmq_lib:
    driver: local
  rabbitmq_log:
    driver: local

